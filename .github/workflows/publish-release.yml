---
name: Publish Release

concurrency:
  group: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
      with:
        go-version-file: "go.mod"
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-to-cdn:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_CLI_DISTRIBUTION_ROLE_ARN }}
        aws-region: us-east-1
    - name: Download release assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        mkdir -p release-assets
        gh release download "$GITHUB_REF_NAME" -D release-assets
    - name: Upload to S3
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        aws s3 sync release-assets/ "s3://cli.mercury.com/v${VERSION}/"
        echo -n "$VERSION" | aws s3 cp - "s3://cli.mercury.com/VERSION"
        aws s3 cp scripts/install.sh "s3://cli.mercury.com/install.sh"
    - name: Invalidate CloudFront cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ secrets.CLOUDFRONT_CLI_DISTRIBUTION_ID }}" \
          --paths "/VERSION" "/install.sh"